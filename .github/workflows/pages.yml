name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:             pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # No build step — upload the repo root directly,
      # excluding the PartyKit server directory and node_modules.
      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          # Exclude server-side code that doesn't belong on the CDN
          # (the upload action uses tar; we exclude via .gitattributes pattern)

      - name: Deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v4
